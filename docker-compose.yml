services:
#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
  transfer-mongo:
    image: mongo:7
    container_name: transfer-mongo
    ports:
      - "27020:27017"
    restart: always
    volumes:
      - transfer_mongo:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER_TS}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS_TS}
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "mongosh", "-u", "${MONGO_ROOT_USER_TS}", "-p", "${MONGO_ROOT_PASS_TS}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
  transfer-mongo-init:
    image: mongo:7
    container_name: transfer-mongo-init
    depends_on:
      transfer-mongo:
        condition: service_healthy
    volumes:
      - ./mongo-init:/scripts
    entrypoint: [ "bash", "/scripts/init.sh" ]
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER_TS}
      MONGO_ROOT_PASS: ${MONGO_ROOT_PASS_TS}
      APP_USER: ${MONGO_USER_TS}
      APP_PASS: ${MONGO_PASS_TS}
      MONGO_DB: ${MONGO_DB_TS}
    networks:
      - microservices-net

  #::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
  transfer-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transfer-service
    depends_on:
      transfer-mongo-init:
        condition: service_completed_successfully
    restart: always
    ports:
      - "8082:8080"
    environment:
      SPRING_MONGODB_URI: mongodb://${MONGO_USER_TS}:${MONGO_PASS_TS}@${MONGO_HOSTS_TS}/${MONGO_DB_TS}?authSource=${MONGO_DB_TS}
      JWT_SECRET: ${SECRET_KEY}
    networks:
      - microservices-net


#::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::
volumes:
  transfer_mongo:

networks:
  microservices-net:
    external: true